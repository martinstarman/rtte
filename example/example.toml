# RTTE mission toml file
#
# Entities
#   TBD
#
# Entities.LayerIndex
#   Defines the order in which entities will be rendered.
#   Entities are z-indexed within the same layer.
#
# Entities.Polygon
#   Entity shape.
#   Points are relative to Position.
#
# Entities.Position
#   Entity position.
#
# Entities.Size
#   Entity size.
#
# Entities.Texture.Path
#   Texture file path relative to this file.
# 
# Entities.Texture.Transformation
#   Possible values are:
#     "none" The texture is rendered as is.
#     "fill" The texture will fill the entire polygon. If the texture is smaller, it will be repeated in both axes.
#

[[Entities]]
LayerIndex = 0
Polygon = [[0, 0], [100, 300], [200, 300], [100, 0]]
Position = [100, 100]
Size = [200, 300]

[Entities.Texture]
Path = "textures/grass.png"
Transformation = "fill"

