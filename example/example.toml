# RTTE mission toml file
#
# Entities
#   TBD
#
# Entities.Id (string)
#   Unique entity id.
#
# Entities.LayerIndex (int)
#   Defines the order in which entities will be rendered.
#   Entities are z-indexed within the same layer.
#
# Entities.Polygon (float[][])
#   Entity shape.
#   Points are relative to Position.
#
# Entities.Position (float[])
#   Entity position.
#
# Entities.Selectable (boolean)
#   Is entity selectable by clicking inside polygon.
#
# Entities.Size (float[])
#   Entity size.
#
# Entities.Texture.Path (string)
#   Texture file path relative to this file.
# 
# Entities.Texture.Transformation (enum)
#   Possible values are:
#     "none" The texture is rendered as is.
#     "fill" The texture will fill the entire polygon. If the texture is smaller, it will be repeated in both axes.
#
# Entities.Texture.Animation.Frames (int)
#   Number of texture frames. 
#   The frames in the image are on the x axis.
#
# Entities.Texture.Animation.FramesPerSecond (int)
#   Number of texture frames rendered per second.
#

