# RTTE mission toml file
#
# LayerIndex
#   Defines the order in which entities will be rendered.
#   Entities are z-indexed within the same layer.
#
# Polygon
#   Entity shape.
#   Points are relative to Position in anticlockwise order.
#   Must be convex polygon.
#
# Position
#   Entity position.
#
# Size
#   Entity size.
#
# TexturePath
#   Texture file path. 
#   Relative to this file not a RTTE binary. # TODO: implement me!
#

[[Entities]]
LayerIndex = 0
Polygon = [[0, 0], [100, 300], [200, 300], [100, 0]]
Position = [100, 100]
Size = [200, 300]
TexturePath = "textures/grass.png"

